		<title>Refhoster - Feedback</title>
		<style>
    body {
      font-family: Avenir, Montserrat, Corbel, 'URW Gothic', source-sans-pro, sans-serif;     
      font-weight: 300;      
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      transition: background-color 0.3s ease;
    }

    ::selection {
       background: #5271FF; 
       color: #ffffff;
    }

    .container {
      text-align: center;
    }

    label {
      margin-bottom: 10px;
      font-weight: bold;
      color: #333;
      transition: color 0.3s ease;
    }

    form {
      border: 1px solid #ddd;
      display: flex;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      display: inline-block;
      text-align: center;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      background-color: #fff;
    }

    form h4 {
      margin: 0;
      color: #fff;
    }

    input[type="text"],
    input[type="email"],
    textarea,
    select {
      width: 95%;
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      font-family: 'Helvetica Neue', sans-serif;
      color: #595ad4;
      background-color: #fff;
      font-size: 16px; /* Standard Schriftgröße für die Eingabefelder */
    }

    textarea::placeholder {
      font-size: 15px; /* Gleiche Schriftgröße wie der Text im Paragraph */
    }

    #submit {
      background-color: #5271FF;
      color: white;
      cursor: pointer;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-family: 'Helvetica Neue', sans-serif;
      transition: background-color 0.3s;
    }

    #submit:hover {
      background-color: #5271FF;
    }

    #order-number {
      background-color: #595ad4;
      color: white;
      padding: 10px;
      font-family: 'Helvetica Neue', sans-serif;
      font-weight: bold;
      border: none;
      border-radius: 5px;
    }

    p {
      font-size: 15px; /* Standard Schriftgröße für den Paragraph */
    }

          .footer-container {
            position: relative; /* Ermöglicht die absolute Positionierung des GitHub-Icons */
            max-width: 500px;
            margin: 20px auto; /* Zentriert die Box */
            background-color: #ffffff; /* Graue Box */
            border-radius: 10px; /* Abgerundete Ecken */
            padding: 20px; /* Innenabstand */
            text-align: center;
            border: 1px solid #ddd;
	    margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            flex-direction: column; /* Buttons übereinander */
            align-items: center;
            gap: 10px; /* Abstand zwischen den Buttons */
        }

        .footer-button {
            display: block;
            width: 94%;
            text-align: center;
            background-color: #5271FF;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 15px;
        }

        .footer-nav {
            display: flex;
            justify-content: center; /* Zentriert die Links */
            gap: 20px; /* Abstand zwischen den Links */
            margin-top: 20px;
	    margin-bottom: 20px;
        }

        .footer-link {
            text-decoration: none;
            color: #000000; /* Linkfarbe */
        }
        
        .footer-link:hover {
            color: #5271FF; /* Hover-Farbe für die Links */
        }
        
        .disclaimer {
            font-size: small;
            color: #999; /* Hellgraue Farbe für den Disclaimer */
            margin: 10px 0; /* Abstand um den Disclaimer */
        }
        
        .github-link {
            position: absolute; /* Absolut positioniert */
            bottom: 10px;
            right: 20px;
        }
		</style>
	</head>
	<body>
		<div class="container">
			<form method="post" action="https://script.google.com/macros/s/AKfycbxbL4qbdXisOaycJ30pGwBlbLsRfcutsyEXHTFiSmI1GbcOAdfi8DuhAz8tjEVBwLJFoQ/exec">
				<div style="text-align: left;">
					<center>
				<a href="/">
					<img src="/img/refhoster-logo.png" alt="Refhoster Logo" style="width: 30%; max-width: 1700px; height: auto; margin: 0 auto;">
				</a>
						<hr style="height: 1px; background-color: #E0E0E0; border: none;">
					</center>
					<h2>Feedback</h2>
					<p>Your input is the driving force behind our growth. Thanks for being an integral part of our story!</p>
				</div>
				<textarea name="feedback" rows="5" placeholder="Feedback"></textarea>
				<input type="submit" value="Send" id="submit">
			</form>
		</div>


    <footer>
        <div class="footer-container">
            <div class="button-container">
            </div>
            <nav class="footer-nav">
                <a href="mailto:contact@refhoster.com" class="footer-link">Contact</a>
                <a href="/privacy-policy.html" class="footer-link">Privacy Policy</a>
                <a href="/terms-of-use.html" class="footer-link">Terms of Use</a>
            </nav>
	<hr style="height: 1px; background-color: #E0E0E0; border: none;">
            <p class="disclaimer">© 2024 Refhoster. All rights reserved.</p>
            <a href="https://github.com/linus-sch/Refhoster" class="github-link">
                <img src="/img/github-icon.png" alt="GitHub" <img src="/img/github-icon.png" alt="GitHub" height="32" width="32">

            </a>
        </div>
    </footer>
		<script>
    const form = document.forms[0];
    const submitButton = document.getElementById('submit');

    form.addEventListener('submit', e => {
      e.preventDefault();
      submitButton.value = 'Sent!';
      submitButton.disabled = true;

      const scriptURL = "https://script.google.com/macros/s/AKfycbxbL4qbdXisOaycJ30pGwBlbLsRfcutsyEXHTFiSmI1GbcOAdfi8DuhAz8tjEVBwLJFoQ/exec";
      const formData = new FormData(form);

      fetch(scriptURL, {
          method: 'POST',
          body: formData
        })
        .then(response => {
          alert("Your message has been sent successfully.");
          form.reset();
          submitButton.value = 'Send';
          submitButton.disabled = false;
        })
        .catch(error => {
          console.error('Error!', error.message);
          submitButton.value = 'Send';
          submitButton.disabled = false;
        });
    });
  
		</script>
	</body>
</html>
