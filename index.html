<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refhoster - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
       <script async src="https://www.googletagmanager.com/gtag/js?id=G-QDFP31GGTT"></script>
       <script>
         window.dataLayer = window.dataLayer || [];
         function gtag(){dataLayer.push(arguments);}
         gtag('js', new Date());

         gtag('config', 'G-QDFP31GGTT');
        </script>
    
    <style>
        body {
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif; /* Verwende die Google Font */
            flex-direction: column; /* Vertikale Anordnung */
        }
        .button {
            background-color: #5271FF;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            margin: 5px 0; /* Abstand zwischen den Buttons (5px oben und unten) */
            cursor: pointer;
            font-size: 16px;
            font-family: 'Roboto', sans-serif; /* Schriftart für die Buttons */
            transition: background-color 0.3s; /* Sanfter Übergang für den Hover-Effekt */
            text-decoration: none; /* Entfernt die Unterstreichung */
            display: inline-block; /* Macht den Link wie einen Button */
        }
        .button:hover {
            background-color: #4058D0; /* Dunklere Farbe beim Hover */
        }

        /* Media Query für mobile Geräte */
        @media (min-width: 600px) {
            body {
                flex-direction: row; /* Horizontale Anordnung auf größeren Bildschirmen */
            }
            .button {
                margin: 0 5px; /* Abstand von 5px links und rechts auf größeren Bildschirmen */
            }
        }
    </style>
</head>
<body>
    <a href="/Create" class="button">Create Collection</a>
    <a href="/Enter-Pin" class="button">View Collection</a>
</body>
</html>
