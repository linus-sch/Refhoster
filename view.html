		<style>
        body {

            max-width: 400px;

        }

        #links-container {

        .collection-title {

        .collection-subtitle {

.link-container {
    margin-bottom: 20px;
    padding: 15px;
    background-color: #f9f9f9;

}


        .link-container h4 {

        .link-container a:hover {

        .view-count {
            font-size: small;
            color: grey;
            text-align: center;
        }

        .error-message {
            color: #fc6146;
            font-size: 16px;
            margin-top: 10px;
        }

        .enter-pin-button {
            display: block;
            width: 95%;
            background-color: #5271FF;
            color: white;
            padding: 10px;
            border: none;

            cursor: pointer;

        .source-id-input-box {
            width: 94%;

            padding: 10px;

                font-family: 'Montserrat', sans-serif; /* Schriftart hinzufügen */
                    font-size: 15px; /* Schriftgröße anpassen */


            margin-top: 25px;
        }
        
        .source-id-input-box:focus {
            border-color: #007bff;
            box-shadow: 0 2px 0 0 #007bff;
        }
        
        .source-id-input-box::placeholder {
            color: #ccc;
        }

button[type="submit"] {
    width: 100%;

}

        
        button[type="submit"]:hover {
            background-color: #3e57c9;
        }
              .footer-container {
            position: relative; /* Ermöglicht die absolute Positionierung des GitHub-Icons */
            max-width: 500px;
            margin: 20px auto; /* Zentriert die Box */
            background-color: #ffffff; /* Graue Box */
            border-radius: 10px; /* Abgerundete Ecken */
            padding: 20px; /* Innenabstand */
            text-align: center;
            border: 1px solid #ddd;
	    margin-bottom: 30px;
        }

        .footer-nav {
            display: flex;
            justify-content: center; /* Zentriert die Links */
            gap: 20px; /* Abstand zwischen den Links */
            margin-top: 20px;
	    margin-bottom: 20px;
        }

        .footer-link {
            text-decoration: none;
            color: #000000; /* Linkfarbe */
        }
        
        .footer-link:hover {
            color: #5271FF; /* Hover-Farbe für die Links */
        }

		</style>
	</head>
	<body>
		<div class="container">
			<div id="links-container"></div>
			<div id="error-message" class="error-message"></div>
			<form id="pin-form" style="display: none;">
				<input id="pin-input" class="source-id-input-box" type="text" placeholder="1234" maxlength="4" required="">
				<button type="submit">Submit</button>
			</form>
			<a id="enter-pin-button" class="enter-pin-button" href="/Enter-Pin" style="display: none;">Enter a Pin</a>
		</div>
		<div style="text-align: center;">
			<a href="/create" style="display: inline-block; background-color: #5271FF; color: white; text-decoration: none; padding: 5px 10px; border-radius: 10px; font-size: small;">Create link collection</a>
		</div>

    <footer>
        <div class="footer-container">
            <nav class="footer-nav">
                <a href="/privacy-policy.html" class="footer-link">Privacy Policy</a>
                <a href="/terms-of-use.html" class="footer-link">Terms of Use</a>
            </nav>

            </a>
        </div>
    </footer>
		<script>
        const linksContainer = document.getElementById('links-container');
        const errorMessageContainer = document.getElementById('error-message');
        const enterPinButton = document.getElementById('enter-pin-button');
        const pinForm = document.getElementById('pin-form');
        const pinInput = document.getElementById('pin-input');

        // Funktion zum Abrufen des URL-Parameters
        function getUrlParameter(name) {
            name = name.replace(/[$$]/, '\\[').replace(/[$$]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Funktion zum Abrufen der Links basierend auf dem PIN
        function fetchLinks(pin) {
            fetch(`https://script.google.com/macros/s/AKfycbzfSUloS7zdHxJkcSEb6Se9vvYv6E5QnGJlt3x9BRDD2oN4homBVqNTwGKCn3ApmQg_rA/exec?sourceId=${pin}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        displayError(data.error);
                    } else {
                        displayLinks(data);
                    }
                })
                .catch(error => {
                    displayError('Error fetching data. Please try again.');
                });
        }


        // Funktion zum Anzeigen der Links
        function displayLinks(data) {
			document.title = data.collectionTitle; // Setze den Titel des Tabs
            linksContainer.innerHTML = '';
            const collectionTitle = document.createElement('h2');
            collectionTitle.className = 'collection-title';
            collectionTitle.textContent = data.collectionTitle;
            linksContainer.appendChild(collectionTitle);

            const collectionSubtitle = document.createElement('h3');
            collectionSubtitle.className = 'collection-subtitle';
            collectionSubtitle.textContent = data.collectionSubtitle;
            linksContainer.appendChild(collectionSubtitle);

            const viewCount = document.createElement('p');
            viewCount.className = 'view-count';
            viewCount.textContent = `Views: ${data.viewCount}`;
            linksContainer.appendChild(viewCount);

            const linksHeader = document.createElement('h3');
            linksHeader.className = 'links-header';
            linksHeader.textContent = 'Links:';
            linksContainer.appendChild(linksHeader);

            data.links.forEach((link) => {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'link-container';

                const linkTitle = document.createElement('h4');
                linkTitle.textContent = link.title;
                linkContainer.appendChild(linkTitle);

                const linkAnchor = document.createElement('a');
                linkAnchor.href = link.link;
                linkAnchor.target = '_blank';
                linkAnchor.textContent = link.link;
                linkContainer.appendChild(linkAnchor);

                linksContainer.appendChild(linkContainer);
            });

            linksContainer.style.display = 'block';
            pinForm.style.display = 'none'; // Verstecke das Formular, wenn Links angezeigt werden
        }

        // Funktion zum Anzeigen von Fehlern
        function displayError(message) {
            errorMessageContainer.textContent = message;
            errorMessageContainer.style.display = 'block';
            linksContainer.style.display = 'none';
            pinForm.style.display = 'block'; // Zeige das Formular, wenn ein Fehler auftritt
        }

        // Hauptfunktion, die beim Laden der Seite ausgeführt wird
        window.onload = function() {
            const pin = getUrlParameter('pin'); // 'pin' ist der Parametername
            if (pin.length === 4) {
                fetchLinks(pin); // Rufe die Links mit dem PIN ab
            } else {
                displayError('Enter source pin.');
            }
        };

        // Event-Listener für das Absenden des Formulars
        pinForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const enteredPin = pinInput.value.trim();
            if (enteredPin.length === 4) {
                window.location.search = `?pin=${enteredPin}`;
            } else {
                displayError('Please enter a valid 4-digit PIN.');
            }
        });
    
		</script>
	</body>
</html>
